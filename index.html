<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Details</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="icon" type="image/x-icon" href="icons/weather.png">
</head>
<body>
    <div class="card">
        <div class="search">
            <input  type="text" name="" id="searchField" placeholder="enter city name" spellcheck="false">
            <button onclick="searchBtn()"><img src="images/search.png" alt=""></button>
        </div>
        <div class="weather">
            <img src="images/rain.png" alt="" class="weather-icon">
            <div id="weatherContainer">
                
            </div>
            <h1 id="temp" class="temp">0°c</h1>
            <h2 id="cityName" class="city"></h2>
            <div class="details" id="details">
                <div class="col">
                    <img src="images/humidity.png" alt="">
                    <div>
                        <p id="humidity" class="humidity">0%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="">
                    <div>
                        <p class="wind"><span id="wind">0</span> km/h</p>
                        <p>Wind speed</p>
                    </div>
                </div> 
            </div>
        </div>
    </div>
    

    <!-- script -->
     <script src="script/index.js"></script>
</body>
</html>
